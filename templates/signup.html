{% extends 'base.html' %}
{% block title %}Sign Up - SmartQuiz{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Join SmartQuiz and start learning</p>

        <form action="{{ url_for('auth.signup') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-input"
                       placeholder="Choose a username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-input"
                       placeholder="you@example.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input"
                       placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
            </div>

            <button type="submit" class="btn btn--primary btn--full">Create Account</button>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
        </p>
    </div>
</div>
{% endblock %}
