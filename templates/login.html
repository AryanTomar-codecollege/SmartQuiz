{% extends 'base.html' %}
{% block title %}Login - SmartQuiz{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Log in to track your quiz progress</p>

        <form action="{{ url_for('auth.login') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-input"
                       placeholder="Enter your username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input"
                       placeholder="Enter your password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn--primary btn--full">Login</button>
        </form>

        <p class="auth-footer">
            Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
